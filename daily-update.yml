name: Daily dashboard refresh

on:
  schedule:
    # 11:15 UTC ≈ 7:15am ET (before the US market opens). Cron is always UTC,
    # so this drifts by an hour around US daylight saving changes - close
    # enough for a daily snapshot. Change the time below if you prefer.
    - cron: "15 11 * * 1-5"
  workflow_dispatch: {}   # lets you click "Run workflow" in the Actions tab to test manually

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/build_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json
          git diff --staged --quiet || git commit -m "Daily data refresh: $(date -u +'%Y-%m-%d')"
          git push
